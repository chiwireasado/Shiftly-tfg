<div class="checkout-container">
    <div class="checkout-card">

        <div class="checkout-header">
            <h2>Finalizar Compra</h2>
            <p>Ingresa los datos de tu tarjeta de crédito o débito de forma segura:</p>
        </div>

        <div class="amount-badge" *ngIf="montoVisual > 0">
            <span class="label">Total a cobrar:</span>
            <span class="price">${{ montoVisual | number:'1.2-2' }}</span>
        </div>

        <div class="stripe-form-group">
            <label class="input-label">Datos de la Tarjeta</label>
            <div class="stripe-input-wrapper">
                <div #cardElement id="card-element"></div>
            </div>
            <small class="secure-text">🔒 Conexión encriptada SSL segura vía Stripe</small>
        </div>

        <div class="error-banner" *ngIf="mensajeError">
            <span class="error-icon">⚠️</span>
            <span class="error-text">{{ mensajeError }}</span>
        </div>

        <button
                (click)="procesarPagoReal()"
                [disabled]="cargando || !clientSecret"
                [class.loading]="cargando"
                class="btn-submit">

            <span *ngIf="!cargando">Confirmar y Pagar ${{ montoVisual }}</span>
            <span *ngIf="cargando" class="spinner-text">Procesando Tarjeta...</span>
        </button>

    </div>
</div>

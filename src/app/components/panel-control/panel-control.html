<div class="container-panel-control">

    <div class="content">


        <form class="active bg-white border border-light-subtle rounded-3 login-form" method="post">

            <h1 class="h4 m-auto mb-3 text-center">Iniciar sesión</h1>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="loginUser" placeholder="Username">
                <label for="loginUser">Usuario</label>

                <div class="invalid-feedback">
                    Este campo es obligatorio.
                </div>
            </div>

            <div class="form-floating mb-5 position-relative">
                <input type="password" class="form-control password" id="loginPassword" placeholder="*******">
                <label for="loginPassword">Contraseña</label>
                <div class="show-password" onclick="TogglePassword(this)">
                    <i class="bi bi-eye-fill fs-5"></i>
                </div>
                <div class="invalid-feedback">
                    Este campo es obligatorio.
                </div>
            </div>
            <div class="d-flex justify-content-center gap-3">
                <button routerLink="/login" class="boton-login btn-light btn-lg px-5">Entrar</button>
                <button routerLink="/registro" class="boton-regis btn-light btn-lg px-4">Registrarme</button>
            </div>
        </form>

    </div>
</div>
